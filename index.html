<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jogo Parapente 3D</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #8fc7e8;
        font-family: Arial, Helvetica, sans-serif;
      }

      #game {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      .hud {
        position: fixed;
        top: 16px;
        left: 16px;
        min-width: 188px;
        padding: 12px;
        color: #f7fbff;
        background: rgba(17, 33, 46, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 6px;
        font-size: 14px;
        line-height: 1.35;
        pointer-events: none;
      }

      .hud-title {
        font-weight: 700;
      }

      .hud-phase {
        margin-top: 2px;
        color: rgba(247, 251, 255, 0.82);
      }

      .hud-grid {
        display: grid;
        grid-template-columns: auto auto;
        gap: 4px 14px;
        margin-top: 10px;
      }

      .hud-grid span {
        color: rgba(247, 251, 255, 0.72);
      }

      .hud-grid strong {
        justify-self: end;
        font-weight: 700;
      }

      .hud-ranking {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid rgba(255, 255, 255, 0.16);
      }

      .hud-ranking-title {
        margin-bottom: 6px;
        font-weight: 700;
      }

      .hud-ranking ol {
        display: grid;
        gap: 5px;
        margin: 0;
        padding-left: 18px;
      }

      .hud-ranking li {
        padding-left: 2px;
      }

      .hud-ranking li span,
      .hud-ranking li strong,
      .hud-ranking li em {
        display: block;
      }

      .hud-ranking li strong {
        font-size: 12px;
      }

      .hud-ranking li em {
        color: rgba(247, 251, 255, 0.65);
        font-size: 11px;
        font-style: normal;
      }

      @media (max-width: 640px) {
        .hud {
          top: 10px;
          left: 10px;
          max-width: calc(100vw - 44px);
          min-width: 0;
          padding: 10px;
          font-size: 12px;
        }

        .hud-grid {
          gap: 3px 10px;
        }

        .hud-ranking {
          margin-top: 8px;
          padding-top: 8px;
        }

        .hud-ranking ol {
          gap: 3px;
        }
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "/vendor/three/three.module.js",
          "three/addons/": "/vendor/three/addons/"
        }
      }
    </script>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="hud" class="hud"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
