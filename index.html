<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jogo Parapente 3D</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath fill='%23ffd166' d='M2 18c6-9 22-9 28 0-7-3-21-3-28 0z'/%3E%3Cpath fill='%2310202a' d='M16 18l-4 10h8l-4-10z'/%3E%3C/svg%3E">
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #8fc7e8;
        font-family: Arial, Helvetica, sans-serif;
      }

      #game {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      .hud {
        position: fixed;
        top: 16px;
        left: 16px;
        min-width: 188px;
        padding: 12px;
        color: #f7fbff;
        background: rgba(17, 33, 46, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 6px;
        font-size: 14px;
        line-height: 1.35;
        pointer-events: none;
        opacity: 0;
        transition: opacity 180ms ease;
      }

      body.is-flying .hud {
        opacity: 1;
      }

      .hud-title {
        font-weight: 700;
      }

      .hud-phase {
        margin-top: 2px;
        color: rgba(247, 251, 255, 0.82);
      }

      .hud-grid {
        display: grid;
        grid-template-columns: auto auto;
        gap: 4px 14px;
        margin-top: 10px;
      }

      .hud-grid span {
        color: rgba(247, 251, 255, 0.72);
      }

      .hud-grid strong {
        justify-self: end;
        font-weight: 700;
      }

      .hud-ranking {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid rgba(255, 255, 255, 0.16);
      }

      .hud-ranking-title {
        margin-bottom: 6px;
        font-weight: 700;
      }

      .hud-ranking ol {
        display: grid;
        gap: 5px;
        margin: 0;
        padding-left: 18px;
      }

      .hud-ranking li {
        padding-left: 2px;
      }

      .hud-ranking li span,
      .hud-ranking li strong,
      .hud-ranking li em {
        display: block;
      }

      .hud-ranking li strong {
        font-size: 12px;
      }

      .hud-ranking li em {
        color: rgba(247, 251, 255, 0.65);
        font-size: 11px;
        font-style: normal;
      }

      .start-panel {
        position: fixed;
        right: 24px;
        bottom: 24px;
        width: min(320px, calc(100vw - 48px));
        padding: 16px;
        color: #f7fbff;
        background: rgba(16, 31, 42, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.22);
      }

      body.is-flying .start-panel {
        display: none;
      }

      .start-title {
        margin: 0 0 12px;
        font-size: 18px;
        font-weight: 700;
      }

      .color-options {
        display: grid;
        grid-template-columns: repeat(6, 36px);
        gap: 8px;
        margin-bottom: 14px;
      }

      .color-option {
        position: relative;
        width: 36px;
        height: 36px;
      }

      .color-option input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .color-option span {
        display: block;
        width: 100%;
        height: 100%;
        border: 2px solid rgba(255, 255, 255, 0.38);
        border-radius: 50%;
        box-sizing: border-box;
        cursor: pointer;
      }

      .color-option input:checked + span {
        border-color: #ffffff;
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.22);
      }

      .start-button {
        width: 100%;
        min-height: 42px;
        color: #10202a;
        background: #ffd166;
        border: 0;
        border-radius: 6px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .start-button:focus-visible,
      .color-option input:focus-visible + span {
        outline: 2px solid #ffffff;
        outline-offset: 3px;
      }

      @media (max-width: 640px) {
        .hud {
          top: 10px;
          left: 10px;
          max-width: calc(100vw - 44px);
          min-width: 0;
          padding: 10px;
          font-size: 12px;
        }

        .hud-grid {
          gap: 3px 10px;
        }

        .hud-ranking {
          margin-top: 8px;
          padding-top: 8px;
        }

        .hud-ranking ol {
          gap: 3px;
        }

        .start-panel {
          right: 12px;
          bottom: 12px;
          width: calc(100vw - 56px);
        }
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "/vendor/three/three.module.js",
          "three/addons/": "/vendor/three/addons/"
        }
      }
    </script>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="hud" class="hud"></div>
    <div id="start-panel" class="start-panel">
      <h1 class="start-title">Jogo Parapente 3D</h1>
      <div class="color-options" aria-label="Cor do parapente">
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0xa8dff2" checked>
          <span style="background: #a8dff2"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0xff5a5f">
          <span style="background: #ff5a5f"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0x53d17a">
          <span style="background: #53d17a"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0xffd166">
          <span style="background: #ffd166"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0xb48cff">
          <span style="background: #b48cff"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0xff8c42">
          <span style="background: #ff8c42"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0x2ec4b6">
          <span style="background: #2ec4b6"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0xf72585">
          <span style="background: #f72585"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0x4361ee">
          <span style="background: #4361ee"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0xffffff">
          <span style="background: #ffffff"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0x111827">
          <span style="background: #111827"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0x9acd32">
          <span style="background: #9acd32"></span>
        </label>
      </div>
      <button id="start-flight" class="start-button" type="button">Iniciar voo</button>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
