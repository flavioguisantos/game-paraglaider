<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jogo Parapente 3D</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath fill='%23ffd166' d='M2 18c6-9 22-9 28 0-7-3-21-3-28 0z'/%3E%3Cpath fill='%2310202a' d='M16 18l-4 10h8l-4-10z'/%3E%3C/svg%3E">
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #8fc7e8;
        font-family: Arial, Helvetica, sans-serif;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }

      #game {
        display: block;
        width: 100vw;
        height: var(--app-height, 100vh);
        touch-action: none;
      }

      /* HUD estilo instrumento de voo (vario/GPS de parapente). */
      .hud {
        position: fixed;
        top: 16px;
        left: 16px;
        width: 236px;
        color: #eef6ff;
        font-family: ui-monospace, "Cascadia Mono", Consolas, "SF Mono", Menlo, monospace;
        pointer-events: none;
        -webkit-user-select: none;
        user-select: none;
        opacity: 0;
        transition: opacity 180ms ease;
      }

      body.is-flying .hud {
        opacity: 1;
      }

      .hud-instrument {
        padding: 10px 12px 12px;
        background: linear-gradient(160deg, rgba(21, 27, 34, 0.93), rgba(8, 12, 17, 0.93));
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 10px;
        box-shadow: 0 12px 34px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.07);
      }

      .instr-top {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        letter-spacing: 0.08em;
        color: #9fb4c8;
      }

      .instr-top [data-hud="status"] {
        font-weight: 700;
        color: #cfe3f4;
      }

      .instr-cell {
        display: grid;
        gap: 1px;
      }

      .instr-cell span {
        font-size: 9px;
        letter-spacing: 0.14em;
        color: #7e93a8;
      }

      .instr-cell strong {
        font-size: 17px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
        line-height: 1.1;
      }

      .instr-cell em {
        font-style: normal;
        font-size: 9px;
        color: #7e93a8;
      }

      .instr-alts {
        display: flex;
        justify-content: space-between;
        margin-top: 8px;
      }

      .instr-alts .instr-cell:last-child {
        text-align: right;
      }

      .instr-vario {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 10px 0;
        padding: 8px 12px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
      }

      .vario-bar {
        position: relative;
        width: 8px;
        height: 58px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        overflow: hidden;
      }

      .vario-bar::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        top: 50%;
        height: 1px;
        background: rgba(255, 255, 255, 0.45);
      }

      .vario-fill {
        position: absolute;
        left: 0;
        right: 0;
        background: #59d98c;
        transition: height 120ms linear;
      }

      .vario-value strong {
        display: block;
        font-size: 30px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        line-height: 1;
      }

      .vario-value em {
        font-style: normal;
        font-size: 10px;
        letter-spacing: 0.14em;
        color: #7e93a8;
      }

      .vario-value.is-climb strong {
        color: #59d98c;
      }

      .vario-value.is-sink strong {
        color: #ff6b66;
      }

      .instr-thermal {
        position: relative;
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 0 0 10px;
        padding: 8px 12px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        opacity: 0.45;
        transition: opacity 200ms ease;
      }

      .instr-thermal.is-active {
        opacity: 1;
      }

      .thermal-ring {
        position: relative;
        width: 60px;
        height: 60px;
        flex: none;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
      }

      .thermal-sector {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 6px;
        height: 6px;
        margin: -3px 0 0 -3px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.15);
        will-change: transform;
      }

      .thermal-arrow {
        position: absolute;
        top: 50%;
        left: 50%;
        transform-origin: 50% 50%;
        margin: -11px 0 0 -6px;
        font-size: 20px;
        line-height: 1;
        color: #ffd166;
        will-change: transform;
        transition: opacity 200ms ease;
      }

      .thermal-core {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 5px;
        height: 5px;
        margin: -2.5px 0 0 -2.5px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.4);
      }

      .thermal-label {
        font-size: 12px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        color: #c8d8e6;
      }

      .instr-thermal.is-active .thermal-label {
        color: #ffd166;
      }

      .instr-row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }

      .wind-readout {
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }

      [data-hud="windArrow"] {
        display: inline-block;
        transform-origin: 50% 52%;
        font-size: 14px;
        color: #ffd166;
      }

      .instr-compass {
        position: relative;
        height: 26px;
        margin-top: 10px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 6px;
      }

      .compass-tape {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 50%;
        will-change: transform;
      }

      .compass-tick {
        position: absolute;
        top: 16px;
        width: 1px;
        height: 5px;
        background: rgba(255, 255, 255, 0.32);
      }

      .compass-tick--major {
        top: 14px;
        height: 8px;
        background: rgba(255, 255, 255, 0.6);
      }

      .compass-label {
        position: absolute;
        top: 2px;
        transform: translateX(-50%);
        font-size: 9px;
        letter-spacing: 0.05em;
        color: #c8d8e6;
      }

      .compass-marker {
        position: absolute;
        left: 50%;
        top: 0;
        bottom: 0;
        width: 2px;
        margin-left: -1px;
        background: #ffd166;
        box-shadow: 0 0 6px rgba(255, 209, 102, 0.7);
      }

      .instr-distance {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-top: 8px;
        font-size: 11px;
        color: #9fb4c8;
      }

      .instr-distance strong {
        font-size: 13px;
        font-variant-numeric: tabular-nums;
        color: #eef6ff;
      }

      .instr-score {
        display: grid;
        grid-template-columns: 1.4fr 0.8fr 0.8fr;
        gap: 6px;
        margin-top: 9px;
        padding-top: 8px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      .instr-score div {
        display: grid;
        gap: 1px;
      }

      .instr-score span {
        font-size: 9px;
        letter-spacing: 0.14em;
        color: #7e93a8;
      }

      .instr-score strong {
        font-size: 15px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        color: #ffd166;
      }

      .instr-event {
        min-height: 16px;
        margin-top: 4px;
        font-size: 11px;
        font-weight: 700;
        color: #59d98c;
        text-align: right;
      }

      .hud-ranking {
        margin-top: 10px;
        padding: 10px 12px;
        background: rgba(13, 19, 25, 0.82);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
      }

      .hud-ranking-title {
        margin-bottom: 6px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #9fb4c8;
      }

      .hud-ranking ol {
        display: grid;
        gap: 5px;
        margin: 0;
        padding-left: 18px;
        font-size: 12px;
      }

      .hud-ranking li {
        padding-left: 2px;
      }

      .hud-ranking li span,
      .hud-ranking li strong,
      .hud-ranking li em {
        display: block;
      }

      .hud-ranking li strong {
        font-size: 12px;
      }

      .hud-ranking li em {
        color: rgba(247, 251, 255, 0.65);
        font-size: 11px;
        font-style: normal;
      }

      .score-pop {
        position: fixed;
        top: 24px;
        left: 50%;
        display: grid;
        min-width: 190px;
        padding: 12px 18px 14px;
        text-align: center;
        color: #f7fbff;
        background: linear-gradient(155deg, rgba(16, 31, 42, 0.94), rgba(40, 56, 50, 0.94));
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 8px;
        box-shadow: 0 14px 34px rgba(0, 0, 0, 0.34), 0 0 30px rgba(255, 209, 102, 0.18);
        opacity: 0;
        pointer-events: none;
        transform: translate(-50%, -14px) scale(0.96);
        transition: opacity 160ms ease, transform 220ms ease;
        z-index: 14;
      }

      .score-pop.is-visible {
        opacity: 1;
        transform: translate(-50%, 0) scale(1);
      }

      .score-pop span {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #9fb4c8;
      }

      .score-pop strong {
        margin-top: 2px;
        font-size: 28px;
        line-height: 1;
        font-variant-numeric: tabular-nums;
        color: #ffd166;
      }

      .score-pop em {
        margin-top: 5px;
        font-size: 12px;
        font-style: normal;
        font-weight: 700;
        color: #59d98c;
      }

      .celebration {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(6, 12, 18, 0.55);
        z-index: 30;
      }

      .celebration[hidden] {
        display: none;
      }

      .celebration-confetti {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .celebration-card {
        position: relative;
        display: grid;
        gap: 14px;
        width: min(430px, calc(100% - 40px));
        max-height: calc(var(--app-height, 100vh) - 40px);
        overflow-y: auto;
        padding: 22px 24px 18px;
        text-align: center;
        color: #f7fbff;
        background: linear-gradient(155deg, rgba(16, 31, 42, 0.96), rgba(40, 56, 50, 0.96));
        border: 1px solid rgba(255, 255, 255, 0.24);
        border-radius: 12px;
        box-shadow: 0 22px 54px rgba(0, 0, 0, 0.45), 0 0 46px rgba(255, 209, 102, 0.22);
        animation: celebration-pop 340ms ease;
      }

      @keyframes celebration-pop {
        from {
          opacity: 0;
          transform: translateY(18px) scale(0.94);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .celebration-kicker {
        display: block;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #9fb4c8;
      }

      .celebration-title {
        display: block;
        margin-top: 2px;
        font-size: 54px;
        line-height: 1;
        font-weight: 900;
        color: #ffd166;
        text-shadow: 0 4px 18px rgba(255, 209, 102, 0.35);
      }

      .celebration-location {
        display: block;
        margin-top: 6px;
        font-size: 14px;
        font-style: normal;
        font-weight: 700;
      }

      .celebration-score span {
        display: block;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #9fb4c8;
      }

      .celebration-score strong {
        font-size: 34px;
        line-height: 1.1;
        font-variant-numeric: tabular-nums;
        color: #59d98c;
      }

      .celebration-stats {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }

      .celebration-stats div {
        padding: 8px 6px 9px;
        background: rgba(247, 251, 255, 0.06);
        border: 1px solid rgba(247, 251, 255, 0.16);
        border-radius: 8px;
      }

      .celebration-stats span {
        display: block;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #9fb4c8;
      }

      .celebration-stats strong {
        font-size: 16px;
        font-variant-numeric: tabular-nums;
      }

      .celebration-actions {
        display: grid;
        gap: 8px;
      }

      .celebration-actions button {
        padding: 11px 14px;
        font-size: 14px;
        font-weight: 700;
        color: #10222e;
        background: #ffd166;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }

      .celebration-actions .celebration-download {
        color: #f7fbff;
        background: rgba(247, 251, 255, 0.14);
        border: 1px solid rgba(247, 251, 255, 0.32);
      }

      .celebration-actions .celebration-close {
        color: #9fb4c8;
        background: transparent;
        border: 1px solid rgba(159, 180, 200, 0.4);
      }

      .celebration-feedback {
        min-height: 16px;
        font-size: 12px;
        color: #59d98c;
      }

      .layer-panel {
        position: fixed;
        top: 16px;
        right: 16px;
        display: grid;
        gap: 5px;
        max-width: 190px;
        padding: 10px 12px;
        color: #f7fbff;
        background: rgba(17, 33, 46, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 6px;
        font-size: 12px;
        line-height: 1.3;
        z-index: 10;
      }

      .layer-panel-title {
        font-weight: 700;
        font-size: 13px;
      }

      .layer-panel label {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        -webkit-user-select: none;
        user-select: none;
      }

      .layer-panel input {
        margin: 0;
      }

      @media (max-width: 640px) {
        .layer-panel {
          display: none;
        }
      }

      .camera-toggle {
        position: fixed;
        right: max(14px, env(safe-area-inset-right));
        bottom: calc(max(14px, env(safe-area-inset-bottom)) + 150px);
        width: 46px;
        height: 46px;
        display: none;
        color: #f7fbff;
        background: rgba(16, 31, 42, 0.62);
        border: 1px solid rgba(255, 255, 255, 0.26);
        border-radius: 50%;
        font-size: 20px;
        line-height: 1;
        cursor: pointer;
        z-index: 11;
        -webkit-tap-highlight-color: transparent;
      }

      body.is-flying .camera-toggle {
        display: block;
      }

      .camera-toggle[hidden],
      body.is-flying .camera-toggle[hidden] {
        display: none !important;
      }

      .camera-toggle.is-first-person {
        color: #10202a;
        background: #ffd166;
        border-color: rgba(255, 255, 255, 0.68);
      }

      .restart-button {
        position: fixed;
        top: max(16px, env(safe-area-inset-top));
        right: max(76px, calc(env(safe-area-inset-right) + 76px));
        display: none;
        place-items: center;
        width: 38px;
        height: 38px;
        color: rgba(247, 251, 255, 0.86);
        background: rgba(16, 31, 42, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 50%;
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.18);
        font: 700 20px/1 Arial, Helvetica, sans-serif;
        cursor: pointer;
        opacity: 0;
        transition: opacity 180ms ease, background 120ms ease, color 120ms ease;
        z-index: 11;
        -webkit-tap-highlight-color: transparent;
      }

      body.is-flying .restart-button {
        display: grid;
        opacity: 0.72;
      }

      .restart-button:hover,
      .restart-button:focus-visible {
        color: #10202a;
        background: #ffd166;
        opacity: 1;
        outline: none;
      }

      .touch-controls {
        position: fixed;
        inset: auto max(14px, env(safe-area-inset-right)) max(14px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
        display: none;
        justify-content: space-between;
        align-items: end;
        pointer-events: none;
        -webkit-user-select: none;
        user-select: none;
        opacity: 0;
        transition: opacity 180ms ease;
      }

      body.is-flying .touch-controls {
        opacity: 1;
      }

      .touch-joystick-shell {
        position: relative;
        width: 156px;
        height: 156px;
        pointer-events: auto;
      }

      .touch-joystick {
        position: relative;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background:
          radial-gradient(circle at 50% 50%, rgba(255, 209, 102, 0.12), rgba(255, 209, 102, 0) 45%),
          radial-gradient(circle at 50% 50%, rgba(16, 31, 42, 0.86), rgba(8, 15, 22, 0.74));
        border: 1px solid rgba(255, 255, 255, 0.16);
        box-shadow:
          0 16px 32px rgba(0, 0, 0, 0.24),
          inset 0 0 0 1px rgba(255, 255, 255, 0.04);
        touch-action: none;
        -webkit-touch-callout: none;
        overflow: hidden;
      }

      .touch-joystick::before,
      .touch-joystick::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        background: rgba(255, 255, 255, 0.08);
        transform: translate(-50%, -50%);
        pointer-events: none;
      }

      .touch-joystick::before {
        width: 1px;
        height: calc(100% - 32px);
      }

      .touch-joystick::after {
        width: calc(100% - 32px);
        height: 1px;
      }

      .touch-joystick-ring {
        position: absolute;
        inset: 14px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        pointer-events: none;
      }

      .touch-joystick-ring--inner {
        inset: 42px;
      }

      .touch-joystick-label {
        position: absolute;
        color: #f7fbff;
        font: 700 11px/1 Arial, Helvetica, sans-serif;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        opacity: 0.72;
        pointer-events: none;
      }

      .touch-joystick-label--up {
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
      }

      .touch-joystick-label--down {
        bottom: 14px;
        left: 50%;
        transform: translateX(-50%);
      }

      .touch-joystick-label--left {
        left: 18px;
        top: 50%;
        transform: translateY(-50%);
      }

      .touch-joystick-label--right {
        right: 18px;
        top: 50%;
        transform: translateY(-50%);
      }

      .touch-joystick-knob {
        --stick-x: 0px;
        --stick-y: 0px;
        position: absolute;
        left: 50%;
        top: 50%;
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background:
          radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.38), rgba(255, 255, 255, 0.06) 45%),
          linear-gradient(180deg, rgba(255, 209, 102, 0.92), rgba(223, 162, 53, 0.94));
        border: 1px solid rgba(255, 255, 255, 0.42);
        box-shadow:
          0 14px 26px rgba(0, 0, 0, 0.28),
          inset 0 2px 6px rgba(255, 255, 255, 0.28);
        transform: translate(calc(-50% + var(--stick-x)), calc(-50% + var(--stick-y)));
        transition: transform 60ms linear, box-shadow 120ms ease;
        pointer-events: none;
      }

      .touch-joystick.is-active .touch-joystick-knob {
        box-shadow:
          0 18px 30px rgba(0, 0, 0, 0.3),
          inset 0 2px 6px rgba(255, 255, 255, 0.32);
      }

      .touch-actions {
        display: grid;
        align-items: end;
        gap: 10px;
        pointer-events: auto;
      }

      .touch-control {
        width: 58px;
        height: 58px;
        color: #f7fbff;
        background: rgba(16, 31, 42, 0.62);
        border: 1px solid rgba(255, 255, 255, 0.26);
        border-radius: 50%;
        box-shadow: 0 10px 26px rgba(0, 0, 0, 0.22);
        font: 700 18px/1 Arial, Helvetica, sans-serif;
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }

      .touch-control:active,
      .touch-control.is-active {
        color: #10202a;
        background: #ffd166;
        border-color: rgba(255, 255, 255, 0.68);
      }

      .start-panel {
        position: fixed;
        right: 24px;
        bottom: 24px;
        width: min(320px, calc(100vw - 48px));
        padding: 16px;
        color: #f7fbff;
        background: rgba(16, 31, 42, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.22);
      }

      body.is-flying .start-panel {
        display: none;
      }

      .start-title {
        margin: 0 0 12px;
        font-size: 18px;
        font-weight: 700;
      }

      .start-field {
        display: grid;
        gap: 8px;
        margin-bottom: 14px;
      }

      .start-field--vehicle .location-options {
        max-height: none;
      }

      .start-field-title {
        color: rgba(247, 251, 255, 0.76);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .location-options {
        display: grid;
        gap: 8px;
        max-height: 260px;
        overflow-y: auto;
        padding-right: 4px;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 209, 102, 0.55) rgba(255, 255, 255, 0.08);
      }

      .location-options::-webkit-scrollbar {
        width: 8px;
      }

      .location-options::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 4px;
      }

      .location-options::-webkit-scrollbar-thumb {
        background: rgba(255, 209, 102, 0.55);
        border-radius: 4px;
      }

      .location-option {
        position: relative;
        display: grid;
        gap: 2px;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 6px;
        cursor: pointer;
      }

      .location-option input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .location-option strong {
        font-size: 14px;
      }

      .location-option span {
        color: rgba(247, 251, 255, 0.7);
        font-size: 12px;
      }

      .location-option:has(input:checked) {
        border-color: #ffd166;
        background: rgba(255, 209, 102, 0.16);
      }

      .color-options {
        display: grid;
        grid-template-columns: repeat(6, 36px);
        gap: 8px;
        margin-bottom: 14px;
      }

      .color-option {
        position: relative;
        width: 36px;
        height: 36px;
      }

      .color-option input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .color-option span {
        display: block;
        width: 100%;
        height: 100%;
        border: 2px solid rgba(255, 255, 255, 0.38);
        border-radius: 50%;
        box-sizing: border-box;
        cursor: pointer;
      }

      .color-option input:checked + span {
        border-color: #ffffff;
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.22);
      }

      .start-button {
        width: 100%;
        min-height: 42px;
        color: #10202a;
        background: #ffd166;
        border: 0;
        border-radius: 6px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .start-button:focus-visible,
      .location-option input:focus-visible + strong,
      .color-option input:focus-visible + span {
        outline: 2px solid #ffffff;
        outline-offset: 3px;
      }

      @media (max-width: 640px) {
        html,
        body {
          height: var(--app-height, 100vh);
        }

        .hud {
          top: max(8px, env(safe-area-inset-top));
          left: 8px;
          right: 8px;
          width: auto;
        }

        .hud-instrument {
          position: relative;
          display: grid;
          grid-template-columns: 58px repeat(4, minmax(0, 1fr));
          align-items: center;
          gap: 4px 8px;
          padding: 6px 8px;
        }

        .instr-top {
          position: absolute;
          top: 4px;
          right: 8px;
          width: auto;
          font-size: 9px;
        }

        .instr-top span:first-child {
          display: none;
        }

        .instr-vario {
          order: 1;
          grid-row: 1 / span 2;
          margin: 0;
          padding: 3px 6px;
          gap: 6px;
        }

        .vario-bar {
          height: 32px;
          width: 5px;
        }

        .vario-value strong {
          font-size: 18px;
        }

        .vario-value em {
          font-size: 8px;
        }

        .instr-alts {
          order: 2;
          display: grid;
          margin: 0;
          gap: 0;
        }

        .instr-alts .instr-cell:first-child {
          display: none;
        }

        .instr-alts .instr-cell:last-child {
          text-align: left;
        }

        .instr-cell span,
        .instr-score span {
          font-size: 8px;
          letter-spacing: 0.1em;
        }

        .instr-cell strong {
          font-size: 13px;
        }

        .instr-cell em {
          font-size: 8px;
        }

        .instr-row {
          order: 3;
          display: grid;
          gap: 0;
        }

        .instr-row .instr-cell:nth-child(2),
        .instr-row .instr-cell:nth-child(3) {
          display: none;
        }

        .instr-compass,
        .instr-distance {
          display: none;
        }

        /* Assistente de termica compacto: so aparece quando ha leitura ativa,
           ocupando a linha livre abaixo dos mostradores (colunas 2 em diante). */
        .instr-thermal {
          display: none;
          order: 5;
          grid-column: 2 / -1;
          margin: 0;
          padding: 2px 8px;
          gap: 10px;
        }

        .instr-thermal.is-active {
          display: flex;
        }

        .instr-thermal .thermal-ring {
          transform: scale(0.72);
          transform-origin: center;
          margin: -8px;
        }

        .instr-thermal .thermal-label {
          font-size: 11px;
        }

        .instr-score {
          order: 4;
          grid-column: span 2;
          grid-template-columns: repeat(3, minmax(0, 1fr));
          gap: 5px;
          margin-top: 0;
          padding-top: 0;
          border-top: 0;
        }

        .instr-score strong {
          font-size: 12px;
        }

        .instr-event {
          display: none;
        }

        .hud-ranking {
          display: none;
          margin-top: 8px;
        }

        body.round-ended .hud-ranking {
          display: block;
        }

        .hud-ranking ol {
          gap: 3px;
        }

        .score-pop {
          top: calc(max(8px, env(safe-area-inset-top)) + 132px);
          min-width: 168px;
          padding: 10px 14px 12px;
        }

        .score-pop strong {
          font-size: 23px;
        }

        .start-panel {
          left: 12px;
          right: 12px;
          bottom: max(12px, env(safe-area-inset-bottom));
          width: auto;
          padding: 14px;
        }

        .start-title {
          display: none;
        }

        .start-panel {
          max-height: calc(var(--app-height, 100vh) - 24px - max(14px, env(safe-area-inset-bottom)));
          overflow-y: auto;
        }

        .start-field {
          margin-bottom: 12px;
        }

        .start-field-title {
          font-size: 11px;
        }

        .location-options {
          max-height: 152px;
        }

        .color-options {
          grid-template-columns: repeat(6, 32px);
          gap: 6px;
          margin-bottom: 0;
        }

        .color-option {
          width: 32px;
          height: 32px;
        }

        .start-field--vehicle {
          margin-bottom: 10px;
        }

        .start-field--vehicle .start-field-title {
          display: none;
        }

        .start-field--vehicle .location-options {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          max-height: none;
          overflow: visible;
          padding-right: 0;
        }

        .start-field--vehicle .location-option {
          min-height: 76px;
          align-content: center;
          justify-items: center;
          gap: 4px;
          padding: 12px 10px;
          text-align: center;
        }

        .start-field--vehicle .location-option span {
          display: none;
        }

        body.mobile-paraglider .camera-toggle {
          bottom: calc(max(14px, env(safe-area-inset-bottom)) + 182px);
        }

        .touch-controls {
          display: flex;
        }

        .restart-button {
          top: calc(max(8px, env(safe-area-inset-top)) + 76px);
          right: max(10px, env(safe-area-inset-right));
          width: 34px;
          height: 34px;
          font-size: 18px;
          opacity: 0.52;
        }
      }

      @media (max-width: 860px) and (orientation: landscape) {
        .hud {
          right: auto;
          width: min(390px, 48vw);
        }

        .touch-controls {
          display: flex;
        }

        .touch-joystick-shell {
          width: 138px;
          height: 138px;
        }

        .touch-joystick-knob {
          width: 58px;
          height: 58px;
        }

        .touch-control {
          width: 52px;
          height: 52px;
          font-size: 17px;
        }

        .restart-button {
          top: max(10px, env(safe-area-inset-top));
          right: max(10px, env(safe-area-inset-right));
        }
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "fflate": "/vendor/fflate/browser.js",
          "three": "/vendor/three/three.module.js",
          "three/addons/": "/vendor/three/addons/"
        }
      }
    </script>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="hud" class="hud"></div>
    <div id="layer-panel" class="layer-panel" aria-label="Camadas do mapa">
      <div class="layer-panel-title">Camadas</div>
    </div>
    <button id="camera-toggle" class="camera-toggle" type="button" title="Camera: externa (C alterna)" aria-label="Alternar camera externa/visao do piloto">📷</button>
    <button id="restart-game" class="restart-button" type="button" title="Reiniciar jogo" aria-label="Reiniciar jogo">↻</button>
    <div id="touch-controls" class="touch-controls" aria-label="Controles de voo por toque">
      <div class="touch-joystick-shell">
        <div class="touch-joystick" data-touch-joystick aria-label="Joystick de voo por arrasto">
          <div class="touch-joystick-ring"></div>
          <div class="touch-joystick-ring touch-joystick-ring--inner"></div>
          <span class="touch-joystick-label touch-joystick-label--up" data-touch-label="up">Acel.</span>
          <span class="touch-joystick-label touch-joystick-label--down" data-touch-label="down">Freia</span>
          <span class="touch-joystick-label touch-joystick-label--left">‹</span>
          <span class="touch-joystick-label touch-joystick-label--right">›</span>
          <div class="touch-joystick-knob" data-touch-joystick-knob></div>
        </div>
      </div>
      <div class="touch-actions">
        <button class="touch-control" type="button" data-control="boost" aria-label="Boost de velocidade">⏭</button>
      </div>
    </div>
    <div id="start-panel" class="start-panel">
      <h1 class="start-title">Jogo Parapente 3D</h1>
      <div class="start-field">
        <div class="start-field-title">Local de voo</div>
        <div class="location-options" aria-label="Local de voo">
          <label class="location-option">
            <input type="radio" name="flight-location" value="atibaia-pedra-grande" checked>
            <strong>Atibaia / Pedra Grande</strong>
            <span>Atibaia - SP</span>
          </label>
          <label class="location-option">
            <input type="radio" name="flight-location" value="sao-pedro">
            <strong>Sao Pedro</strong>
            <span>Sao Pedro - SP · -22.504721, -47.898368</span>
          </label>
          <label class="location-option">
            <input type="radio" name="flight-location" value="pico-do-gaviao">
            <strong>Pico do Gaviao</strong>
            <span>Socorro - SP · -22.015356, -46.626470</span>
          </label>
          <label class="location-option">
            <input type="radio" name="flight-location" value="serra-negra">
            <strong>Serra Negra</strong>
            <span>Serra Negra - SP · -22.619223, -46.677644</span>
          </label>
          <label class="location-option">
            <input type="radio" name="flight-location" value="sao-vicente-itarare">
            <strong>Praia de Sao Vicente, Itarare</strong>
            <span>Sao Vicente - SP · -23.964517, -46.363531</span>
          </label>
        </div>
      </div>
      <div class="start-field start-field--vehicle">
        <div class="start-field-title">Veiculo</div>
        <div class="location-options" aria-label="Veiculo">
          <label class="location-option">
            <input type="radio" name="vehicle-type" value="paraglider" checked>
            <strong>Parapente</strong>
            <span>Voo livre com termicas, camera externa ou visao do piloto.</span>
          </label>
          <label class="location-option">
            <input type="radio" name="vehicle-type" value="drone">
            <strong>Drone FPV</strong>
            <span>Camera sempre em primeira pessoa e velocidade extrema de drone.</span>
          </label>
        </div>
      </div>
      <div class="start-field">
        <div class="start-field-title" data-start-field="color-title">Cor do parapente</div>
        <div class="color-options" aria-label="Cor do parapente">
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0xa8dff2" checked>
          <span style="background: #a8dff2"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0xff5a5f">
          <span style="background: #ff5a5f"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0x53d17a">
          <span style="background: #53d17a"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0xffd166">
          <span style="background: #ffd166"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0xb48cff">
          <span style="background: #b48cff"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0xff8c42">
          <span style="background: #ff8c42"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0x2ec4b6">
          <span style="background: #2ec4b6"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0xf72585">
          <span style="background: #f72585"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0x4361ee">
          <span style="background: #4361ee"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0xffffff">
          <span style="background: #ffffff"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0x111827">
          <span style="background: #111827"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0x9acd32">
          <span style="background: #9acd32"></span>
        </label>
        </div>
      </div>
      <button id="start-flight" class="start-button" type="button">Iniciar voo</button>
    </div>
    <script type="module" src="/src/main.js?v=tp-dist-1"></script>
  </body>
</html>
