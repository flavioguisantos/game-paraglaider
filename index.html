<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jogo Parapente 3D</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath fill='%23ffd166' d='M2 18c6-9 22-9 28 0-7-3-21-3-28 0z'/%3E%3Cpath fill='%2310202a' d='M16 18l-4 10h8l-4-10z'/%3E%3C/svg%3E">
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #8fc7e8;
        font-family: Arial, Helvetica, sans-serif;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }

      #game {
        display: block;
        width: 100vw;
        height: var(--app-height, 100vh);
        touch-action: none;
      }

      /* HUD estilo instrumento de voo (vario/GPS de parapente). */
      .hud {
        position: fixed;
        top: 16px;
        left: 16px;
        width: 236px;
        color: #eef6ff;
        font-family: ui-monospace, "Cascadia Mono", Consolas, "SF Mono", Menlo, monospace;
        pointer-events: none;
        -webkit-user-select: none;
        user-select: none;
        opacity: 0;
        transition: opacity 180ms ease;
      }

      body.is-flying .hud {
        opacity: 1;
      }

      .hud-instrument {
        padding: 10px 12px 12px;
        background: linear-gradient(160deg, rgba(21, 27, 34, 0.93), rgba(8, 12, 17, 0.93));
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 10px;
        box-shadow: 0 12px 34px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.07);
      }

      .instr-top {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        letter-spacing: 0.08em;
        color: #9fb4c8;
      }

      .instr-top [data-hud="status"] {
        font-weight: 700;
        color: #cfe3f4;
      }

      .instr-cell {
        display: grid;
        gap: 1px;
      }

      .instr-cell span {
        font-size: 9px;
        letter-spacing: 0.14em;
        color: #7e93a8;
      }

      .instr-cell strong {
        font-size: 17px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
        line-height: 1.1;
      }

      .instr-cell em {
        font-style: normal;
        font-size: 9px;
        color: #7e93a8;
      }

      .instr-alts {
        display: flex;
        justify-content: space-between;
        margin-top: 8px;
      }

      .instr-alts .instr-cell:last-child {
        text-align: right;
      }

      .instr-vario {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 10px 0;
        padding: 8px 12px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
      }

      .vario-bar {
        position: relative;
        width: 8px;
        height: 58px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        overflow: hidden;
      }

      .vario-bar::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        top: 50%;
        height: 1px;
        background: rgba(255, 255, 255, 0.45);
      }

      .vario-fill {
        position: absolute;
        left: 0;
        right: 0;
        background: #59d98c;
        transition: height 120ms linear;
      }

      .vario-value strong {
        display: block;
        font-size: 30px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        line-height: 1;
      }

      .vario-value em {
        font-style: normal;
        font-size: 10px;
        letter-spacing: 0.14em;
        color: #7e93a8;
      }

      .vario-value.is-climb strong {
        color: #59d98c;
      }

      .vario-value.is-sink strong {
        color: #ff6b66;
      }

      .instr-row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }

      .wind-readout {
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }

      [data-hud="windArrow"] {
        display: inline-block;
        transform-origin: 50% 52%;
        font-size: 14px;
        color: #ffd166;
      }

      .instr-compass {
        position: relative;
        height: 26px;
        margin-top: 10px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 6px;
      }

      .compass-tape {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 50%;
        will-change: transform;
      }

      .compass-tick {
        position: absolute;
        top: 16px;
        width: 1px;
        height: 5px;
        background: rgba(255, 255, 255, 0.32);
      }

      .compass-tick--major {
        top: 14px;
        height: 8px;
        background: rgba(255, 255, 255, 0.6);
      }

      .compass-label {
        position: absolute;
        top: 2px;
        transform: translateX(-50%);
        font-size: 9px;
        letter-spacing: 0.05em;
        color: #c8d8e6;
      }

      .compass-marker {
        position: absolute;
        left: 50%;
        top: 0;
        bottom: 0;
        width: 2px;
        margin-left: -1px;
        background: #ffd166;
        box-shadow: 0 0 6px rgba(255, 209, 102, 0.7);
      }

      .instr-distance {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-top: 8px;
        font-size: 11px;
        color: #9fb4c8;
      }

      .instr-distance strong {
        font-size: 13px;
        font-variant-numeric: tabular-nums;
        color: #eef6ff;
      }

      .hud-ranking {
        margin-top: 10px;
        padding: 10px 12px;
        background: rgba(13, 19, 25, 0.82);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
      }

      .hud-ranking-title {
        margin-bottom: 6px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #9fb4c8;
      }

      .hud-ranking ol {
        display: grid;
        gap: 5px;
        margin: 0;
        padding-left: 18px;
        font-size: 12px;
      }

      .hud-ranking li {
        padding-left: 2px;
      }

      .hud-ranking li span,
      .hud-ranking li strong,
      .hud-ranking li em {
        display: block;
      }

      .hud-ranking li strong {
        font-size: 12px;
      }

      .hud-ranking li em {
        color: rgba(247, 251, 255, 0.65);
        font-size: 11px;
        font-style: normal;
      }

      .layer-panel {
        position: fixed;
        top: 16px;
        right: 16px;
        display: grid;
        gap: 5px;
        max-width: 190px;
        padding: 10px 12px;
        color: #f7fbff;
        background: rgba(17, 33, 46, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 6px;
        font-size: 12px;
        line-height: 1.3;
        z-index: 10;
      }

      .layer-panel-title {
        font-weight: 700;
        font-size: 13px;
      }

      .layer-panel label {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        -webkit-user-select: none;
        user-select: none;
      }

      .layer-panel input {
        margin: 0;
      }

      @media (max-width: 640px) {
        .layer-panel {
          display: none;
        }
      }

      .camera-toggle {
        position: fixed;
        right: max(14px, env(safe-area-inset-right));
        bottom: calc(max(14px, env(safe-area-inset-bottom)) + 150px);
        width: 46px;
        height: 46px;
        display: none;
        color: #f7fbff;
        background: rgba(16, 31, 42, 0.62);
        border: 1px solid rgba(255, 255, 255, 0.26);
        border-radius: 50%;
        font-size: 20px;
        line-height: 1;
        cursor: pointer;
        z-index: 11;
        -webkit-tap-highlight-color: transparent;
      }

      body.is-flying .camera-toggle {
        display: block;
      }

      .camera-toggle.is-first-person {
        color: #10202a;
        background: #ffd166;
        border-color: rgba(255, 255, 255, 0.68);
      }

      .touch-controls {
        position: fixed;
        inset: auto max(14px, env(safe-area-inset-right)) max(14px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
        display: none;
        justify-content: space-between;
        align-items: end;
        pointer-events: none;
        -webkit-user-select: none;
        user-select: none;
        opacity: 0;
        transition: opacity 180ms ease;
      }

      body.is-flying .touch-controls {
        opacity: 1;
      }

      .touch-cluster {
        display: grid;
        gap: 10px;
        pointer-events: auto;
      }

      .touch-cluster--turn {
        grid-template-columns: repeat(2, 58px);
      }

      .touch-cluster--speed {
        grid-template-rows: repeat(2, 58px);
      }

      .touch-control {
        width: 58px;
        height: 58px;
        color: #f7fbff;
        background: rgba(16, 31, 42, 0.62);
        border: 1px solid rgba(255, 255, 255, 0.26);
        border-radius: 50%;
        box-shadow: 0 10px 26px rgba(0, 0, 0, 0.22);
        font: 700 26px/1 Arial, Helvetica, sans-serif;
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }

      .touch-control:active,
      .touch-control.is-active {
        color: #10202a;
        background: #ffd166;
        border-color: rgba(255, 255, 255, 0.68);
      }

      .start-panel {
        position: fixed;
        right: 24px;
        bottom: 24px;
        width: min(320px, calc(100vw - 48px));
        padding: 16px;
        color: #f7fbff;
        background: rgba(16, 31, 42, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.22);
      }

      body.is-flying .start-panel {
        display: none;
      }

      .start-title {
        margin: 0 0 12px;
        font-size: 18px;
        font-weight: 700;
      }

      .start-field {
        display: grid;
        gap: 8px;
        margin-bottom: 14px;
      }

      .start-field-title {
        color: rgba(247, 251, 255, 0.76);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .location-options {
        display: grid;
        gap: 8px;
      }

      .location-option {
        position: relative;
        display: grid;
        gap: 2px;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 6px;
        cursor: pointer;
      }

      .location-option input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .location-option strong {
        font-size: 14px;
      }

      .location-option span {
        color: rgba(247, 251, 255, 0.7);
        font-size: 12px;
      }

      .location-option:has(input:checked) {
        border-color: #ffd166;
        background: rgba(255, 209, 102, 0.16);
      }

      .color-options {
        display: grid;
        grid-template-columns: repeat(6, 36px);
        gap: 8px;
        margin-bottom: 14px;
      }

      .color-option {
        position: relative;
        width: 36px;
        height: 36px;
      }

      .color-option input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .color-option span {
        display: block;
        width: 100%;
        height: 100%;
        border: 2px solid rgba(255, 255, 255, 0.38);
        border-radius: 50%;
        box-sizing: border-box;
        cursor: pointer;
      }

      .color-option input:checked + span {
        border-color: #ffffff;
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.22);
      }

      .start-button {
        width: 100%;
        min-height: 42px;
        color: #10202a;
        background: #ffd166;
        border: 0;
        border-radius: 6px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .start-button:focus-visible,
      .location-option input:focus-visible + strong,
      .color-option input:focus-visible + span {
        outline: 2px solid #ffffff;
        outline-offset: 3px;
      }

      @media (max-width: 640px) {
        html,
        body {
          height: var(--app-height, 100vh);
        }

        .hud {
          top: max(8px, env(safe-area-inset-top));
          left: 8px;
          right: 8px;
          width: auto;
        }

        .hud-instrument {
          display: flex;
          flex-wrap: wrap;
          align-items: center;
          justify-content: space-between;
          gap: 6px 14px;
          padding: 8px 10px;
        }

        .instr-top {
          width: 100%;
          font-size: 10px;
        }

        .instr-vario {
          margin: 0;
          padding: 4px 8px;
          gap: 8px;
        }

        .vario-bar {
          height: 36px;
          width: 6px;
        }

        .vario-value strong {
          font-size: 20px;
        }

        .instr-alts {
          margin: 0;
          gap: 14px;
        }

        .instr-cell strong {
          font-size: 14px;
        }

        .instr-row {
          gap: 14px;
        }

        .instr-row .instr-cell:nth-child(2) {
          display: none;
        }

        .instr-compass,
        .instr-distance {
          display: none;
        }

        .hud-ranking {
          display: none;
          margin-top: 8px;
        }

        body.round-ended .hud-ranking {
          display: block;
        }

        .hud-ranking ol {
          gap: 3px;
        }

        .start-panel {
          right: 12px;
          bottom: 12px;
          width: calc(100vw - 56px);
        }

        .touch-controls {
          display: flex;
        }
      }

      @media (max-width: 860px) and (orientation: landscape) {
        .hud {
          right: auto;
          width: min(390px, 48vw);
        }

        .touch-controls {
          display: flex;
        }

        .touch-control {
          width: 52px;
          height: 52px;
          font-size: 24px;
        }

        .touch-cluster--turn {
          grid-template-columns: repeat(2, 52px);
        }

        .touch-cluster--speed {
          grid-template-rows: repeat(2, 52px);
        }
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "fflate": "/vendor/fflate/browser.js",
          "three": "/vendor/three/three.module.js",
          "three/addons/": "/vendor/three/addons/"
        }
      }
    </script>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="hud" class="hud"></div>
    <div id="layer-panel" class="layer-panel" aria-label="Camadas do mapa">
      <div class="layer-panel-title">Camadas</div>
    </div>
    <button id="camera-toggle" class="camera-toggle" type="button" title="Camera: externa (C alterna)" aria-label="Alternar camera externa/visao do piloto">📷</button>
    <div id="touch-controls" class="touch-controls" aria-label="Controles de voo por toque">
      <div class="touch-cluster touch-cluster--turn">
        <button class="touch-control" type="button" data-control="left" aria-label="Virar para esquerda">‹</button>
        <button class="touch-control" type="button" data-control="right" aria-label="Virar para direita">›</button>
      </div>
      <div class="touch-cluster touch-cluster--speed">
        <button class="touch-control" type="button" data-control="forward" aria-label="Acelerar">⌃</button>
        <button class="touch-control" type="button" data-control="backward" aria-label="Frear">⌄</button>
      </div>
    </div>
    <div id="start-panel" class="start-panel">
      <h1 class="start-title">Jogo Parapente 3D</h1>
      <div class="start-field">
        <div class="start-field-title">Local de voo</div>
        <div class="location-options" aria-label="Local de voo">
          <label class="location-option">
            <input type="radio" name="flight-location" value="atibaia-pedra-grande" checked>
            <strong>Atibaia / Pedra Grande</strong>
            <span>Atibaia - SP</span>
          </label>
          <label class="location-option">
            <input type="radio" name="flight-location" value="sao-vicente-itarare">
            <strong>Praia de Sao Vicente, Itarare</strong>
            <span>Sao Vicente - SP · -23.964517, -46.363531</span>
          </label>
        </div>
      </div>
      <div class="start-field">
        <div class="start-field-title">Cor do parapente</div>
        <div class="color-options" aria-label="Cor do parapente">
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0xa8dff2" checked>
          <span style="background: #a8dff2"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0xff5a5f">
          <span style="background: #ff5a5f"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0x53d17a">
          <span style="background: #53d17a"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0xffd166">
          <span style="background: #ffd166"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0xb48cff">
          <span style="background: #b48cff"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0xff8c42">
          <span style="background: #ff8c42"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0x2ec4b6">
          <span style="background: #2ec4b6"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0xf72585">
          <span style="background: #f72585"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0x4361ee">
          <span style="background: #4361ee"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0xffffff">
          <span style="background: #ffffff"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0x111827">
          <span style="background: #111827"></span>
        </label>
        <label class="color-option">
          <input type="radio" name="canopy-color" value="0x9acd32">
          <span style="background: #9acd32"></span>
        </label>
        </div>
      </div>
      <button id="start-flight" class="start-button" type="button">Iniciar voo</button>
    </div>
    <script type="module" src="/src/main.js?v=realism-1"></script>
  </body>
</html>
